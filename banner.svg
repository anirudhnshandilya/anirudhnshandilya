<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="55%" stop-color="#0a1630"/>
      <stop offset="100%" stop-color="#160b2b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00c2ff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#00c2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#56c8ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="hex" width="86" height="50" patternUnits="userSpaceOnUse">
      <path d="M21.5 1 L64.5 1 L85 25 L64.5 49 L21.5 49 L1 25 Z"
            fill="none" stroke="#9b8cff" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="24" fill="url(#glow1)"/>
  <rect width="1280" height="320" rx="24" fill="url(#glow2)"/>
  <rect width="1280" height="320" rx="24" fill="url(#grid)"/>
  <rect width="1280" height="320" rx="24" fill="url(#hex)"/>

  <g stroke="#00c2ff" stroke-opacity="0.35" fill="none">
    <path d="M60 80 H220 L260 120 H390" />
    <circle cx="60" cy="80" r="4" fill="#00c2ff"/>
    <circle cx="390" cy="120" r="4" fill="#00c2ff"/>
    <path d="M890 70 H1050 L1090 110 H1215" />
    <circle cx="890" cy="70" r="4" fill="#00c2ff"/>
    <circle cx="1215" cy="110" r="4" fill="#00c2ff"/>
    <path d="M90 250 H240 L280 210 H410" />
    <circle cx="90" cy="250" r="4" fill="#00c2ff"/>
  </g>

  <g stroke="#a78bfa" stroke-opacity="0.3" fill="none">
    <path d="M870 245 H1030 L1070 205 H1210" />
    <circle cx="870" cy="245" r="4" fill="#a78bfa"/>
    <circle cx="1210" cy="205" r="4" fill="#a78bfa"/>
  </g>

  <text x="640" y="128" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="49" font-weight="700"
        letter-spacing="4" fill="#f7fbff" filter="url(#softGlow)">
    ANIRUDH N SHANDILYA
  </text>

  <text x="640" y="178" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600"
        letter-spacing="2" fill="#66d9ff">
    INFORMATION SECURITY • GRC • AI SECURITY
  </text>

  <text x="640" y="224" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="20"
        letter-spacing="1.4" fill="#c7d4eb">
    Building open-source tools for governance, detection and cyber resilience
  </text>

  <rect x="26" y="26" width="1228" height="268" rx="18"
        fill="none" stroke="#66d9ff" stroke-opacity="0.22"/>
</svg>
